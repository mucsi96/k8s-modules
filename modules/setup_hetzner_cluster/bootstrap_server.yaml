# Bootstraps a freshly provisioned Hetzner Cloud server that starts as root with an SSH key.
# Creates the non-root user used by the rest of the cluster playbooks and applies the same
# SSH hardening as modules/setup_cluster/secure_private_server.yaml.
- name: Bootstrap Hetzner Server
  hosts: all
  gather_facts: false

  vars:
    ansible_python_interpreter: /usr/bin/python3

  handlers:
    - name: Restart SSH service
      ansible.builtin.systemd_service:
        name: ssh
        state: restarted
        enabled: true

  tasks:
    - name: Ensure non-root user exists
      ansible.builtin.user:
        name: "{{ username }}"
        state: present
        password: "{{ password | password_hash('sha512', 65534 | random(seed=inventory_hostname) | string) }}"
        shell: /bin/bash
        groups: sudo
        append: true

    - name: Enable SSH key authentication for user
      ansible.posix.authorized_key:
        user: "{{ username }}"
        state: present
        key: "{{ public_key }}"

    - name: Change SSH port
      ansible.builtin.lineinfile:
        dest: /etc/ssh/sshd_config
        regexp: "^#?Port"
        line: "Port {{ ssh_port }}"
      notify: Restart SSH service

    - name: Disable SSH root login
      ansible.builtin.lineinfile:
        dest: /etc/ssh/sshd_config
        regexp: "^#?PermitRootLogin"
        line: "PermitRootLogin no"
      notify: Restart SSH service

    - name: Disable password login
      ansible.builtin.lineinfile:
        dest: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication no"
      notify: Restart SSH service

    - name: Drop any cloud-init SSH overrides that might re-enable password auth
      ansible.builtin.file:
        path: /etc/ssh/sshd_config.d/50-cloud-init.conf
        state: absent
      notify: Restart SSH service

    - name: Apply SSH configuration changes
      ansible.builtin.meta: flush_handlers

    - name: Change root password
      ansible.builtin.user:
        name: root
        state: present
        password: "{{ new_root_password | password_hash('sha512', 65534 | random(seed=inventory_hostname) | string) }}"
