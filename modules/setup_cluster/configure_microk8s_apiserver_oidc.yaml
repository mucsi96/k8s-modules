- name: Configure MicroK8s API server structured authentication
  hosts: all
  gather_facts: false
  become: true

  # Structured authentication (kube-apiserver --authentication-config) replaces
  # the legacy --oidc-* flags. Two JWT authenticators are configured against
  # the same Entra v2 issuer but different audiences:
  #
  #   1. apiserver app (kubelogin --server-id) — username = bare `oid`. The
  #      oidc_human_admin and per-app CI RoleBindings key off this name.
  #
  #   2. cluster_monitor app (Headlamp's oauth2-proxy client) — username =
  #      "headlamp:<oid>". Bound to `view` via oidc_dashboard_view, so a token
  #      Headlamp forwards to the apiserver cannot escalate to the user's
  #      cluster-admin binding.
  #
  # Requires k8s >= 1.30 (StructuredAuthenticationConfiguration enabled by
  # default since 1.30 beta, GA in 1.32). MicroK8s latest/stable tracks
  # upstream.
  vars:
    ansible_python_interpreter: /usr/bin/python3
    apiserver_args: /var/snap/microk8s/current/args/kube-apiserver
    auth_config_path: /var/snap/microk8s/current/args/authentication-config.yaml

  tasks:
    - name: Write apiserver authentication config
      ansible.builtin.copy:
        dest: "{{ auth_config_path }}"
        owner: root
        group: root
        mode: "0600"
        content: |
          apiVersion: apiserver.config.k8s.io/v1
          kind: AuthenticationConfiguration
          jwt:
            - issuer:
                url: {{ oidc_issuer_url }}
                audiences:
                  - {{ apiserver_client_id }}
              claimMappings:
                username:
                  claim: oid
                  prefix: ""
            - issuer:
                url: {{ oidc_issuer_url }}
                audiences:
                  - {{ dashboard_client_id }}
              claimMappings:
                username:
                  claim: oid
                  prefix: "headlamp:"
      register: auth_config

    - name: Set apiserver --authentication-config
      ansible.builtin.lineinfile:
        path: "{{ apiserver_args }}"
        regexp: '^--authentication-config='
        line: "--authentication-config={{ auth_config_path }}"
        state: present
      register: auth_config_flag

    # Legacy --oidc-* flags are mutually exclusive with --authentication-config;
    # apiserver refuses to start if both are set. Strip them on first apply
    # (and on any re-apply that finds them, in case of partial state).
    - name: Remove legacy --oidc-* apiserver flags
      ansible.builtin.lineinfile:
        path: "{{ apiserver_args }}"
        regexp: "{{ item }}"
        state: absent
      loop:
        - '^--oidc-issuer-url='
        - '^--oidc-client-id='
        - '^--oidc-username-claim='
        - '^--oidc-username-prefix='
        - '^--oidc-groups-claim='
      register: legacy_oidc

    - name: Restart MicroK8s when apiserver auth config changed
      ansible.builtin.command: snap restart microk8s
      when: auth_config.changed or auth_config_flag.changed or legacy_oidc.changed

    - name: Wait for MicroK8s API to become ready
      ansible.builtin.command: microk8s status --wait-ready --timeout 600
      changed_when: false
      when: auth_config.changed or auth_config_flag.changed or legacy_oidc.changed
