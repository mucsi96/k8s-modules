apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`{{ .Values.host }}`) && Path(`/`)
      kind: Rule
      middlewares:
        - name: traefik-dashboard-errors-redirect
          namespace: {{ .Release.Namespace }}
        - name: traefik-dashboard-forward-auth
          namespace: {{ .Release.Namespace }}
        - name: traefik-dashboard-redirect-root
          namespace: {{ .Release.Namespace }}
      services:
        - kind: TraefikService
          name: api@internal
    - match: Host(`{{ .Values.host }}`)
      kind: Rule
      middlewares:
        - name: traefik-dashboard-errors-redirect
          namespace: {{ .Release.Namespace }}
        - name: traefik-dashboard-forward-auth
          namespace: {{ .Release.Namespace }}
      services:
        - kind: TraefikService
          name: api@internal
