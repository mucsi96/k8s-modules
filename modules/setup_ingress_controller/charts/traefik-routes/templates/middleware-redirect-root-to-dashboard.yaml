apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: traefik-dashboard-redirect-root
  namespace: {{ .Release.Namespace }}
spec:
  redirectRegex:
    regex: {{ printf "^https?://%s/?$" (.Values.host | replace "." "\\.") | squote }}
    replacement: {{ printf "https://%s/dashboard/" .Values.host | squote }}
    permanent: true
