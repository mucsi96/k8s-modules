apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: prometheus-redirect-root
  namespace: {{ .Release.Namespace }}
spec:
  redirectRegex:
    regex: {{ printf "^https?://%s/?$" .Values.prometheusHost | squote }}
    replacement: {{ printf "https://%s/targets" .Values.prometheusHost | squote }}
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prometheus-route
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: {{ printf "Host(`%s`) && Path(`/`)" .Values.prometheusHost | squote }}
      middlewares:
        - name: prometheus-redirect-root
          namespace: {{ .Release.Namespace }}
      services:
        - kind: Service
          name: kube-prometheus-stack-prometheus
          namespace: {{ .Release.Namespace }}
          port: 9090
    - kind: Rule
      match: {{ printf "Host(`%s`)" .Values.prometheusHost | squote }}
      services:
        - kind: Service
          name: kube-prometheus-stack-prometheus
          namespace: {{ .Release.Namespace }}
          port: 9090
