apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: dashboard-errors-redirect
  namespace: {{ .Release.Namespace }}
spec:
  errors:
    status:
      - "401"
    service:
      name: {{ .Values.ssoServiceName }}
      namespace: {{ .Values.ssoNamespace }}
      port: {{ .Values.ssoServicePort }}
    query: "/oauth2/sign_in?rd=https://{host}{url}"
