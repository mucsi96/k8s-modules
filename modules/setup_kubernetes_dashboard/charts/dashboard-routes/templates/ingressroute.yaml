apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: kubernetes-dashboard
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`{{ .Values.host }}`) && PathPrefix(`/oauth2`)
      kind: Rule
      services:
        - kind: Service
          name: {{ .Values.oauth2ProxyServiceName }}
          namespace: {{ .Values.oauth2ProxyNamespace }}
          port: {{ .Values.oauth2ProxyServicePort }}
    - match: Host(`{{ .Values.host }}`)
      kind: Rule
      middlewares:
        - name: dashboard-errors-redirect
          namespace: {{ .Release.Namespace }}
        - name: dashboard-forward-auth
          namespace: {{ .Release.Namespace }}
        - name: dashboard-bearer-token
          namespace: {{ .Release.Namespace }}
      services:
        - kind: Service
          name: kubernetes-dashboard-kong-proxy
          port: 80
