apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: dashboard-forward-auth
  namespace: {{ .Release.Namespace }}
spec:
  forwardAuth:
    address: http://{{ .Values.oauth2ProxyServiceName }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.oauth2ProxyServicePort }}/oauth2/auth
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - X-Auth-Request-Preferred-Username
